name: 💡 功能建议
description: 为 Axolotl Launcher 提议新功能或体验改进
title: '[建议] '
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 Axolotl Launcher 提出建议。请重点描述使用场景和希望解决的问题。

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索[现有 Issues](https://github.com/Mystic-Stars/Axolotl/issues)，没有发现相同或高度相似的建议
          required: true
        - label: 这项建议与 Axolotl Launcher 桌面应用直接相关
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 使用场景与现有问题
      description: 请说明你在什么情况下遇到什么困难，以及该问题会带来哪些影响。
      placeholder: 当我……时，目前需要……，这会导致……
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: 期望的解决方案
      description: 请描述你希望 Axolotl 如何改进，以及理想的使用流程。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 如果你尝试过临时解决方法或考虑过其他设计，请在这里说明。
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 补充信息
      description: 可添加示意图、截图、相关链接或其他背景信息。
    validations:
      required: false
